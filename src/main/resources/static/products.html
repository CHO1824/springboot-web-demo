<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>상품 조회</title>
	<link rel="stylesheet" href="/css/products.css">
</head>
<body>

<div class="container">
	<h1>상품 조회</h1>
	
	<div class="search-box">
		<label>시작일
			<input type="date" id="startDate">
		</label>
		
		<label>종료일
			<input type="date" id="endDate">
		</label>
		
		<button onclick="loadProducts()">조회</button>
	</div>
	
	<table>
		<thead>
		<tr>
			<th>상품명</th>
			<th>가격</th>
			<th>재고</th>
			<th>등록일</th>
		</tr>
		</thead>
		<tbody id="productBody">
		<tr>
			<td colspan="4">조회 버튼을 눌러주세요</td>
		</tr>
		</tbody>
	</table>
</div>

<script>
	async function loadProducts() {
		const start = document.getElementById('startDate').value;
		const end = document.getElementById('endDate').value;
		
		// 1. 간단한 유효성 검사 (시작일이 종료일보다 미래인 경우 차단)
		if (start && end && start > end) {
			alert('시작일은 종료일보다 미래일 수 없습니다.');
			return;
		}
		
		let url = '/api/products';
		// 두 날짜가 모두 있을 때만 쿼리 스트링 추가 (하나만 보낼 수도 있으므로)
		if (start || end) {
			url += `?startDate=${start}&endDate=${end}`;
		}
		
		try {
			const res = await fetch(url);
			const data = await res.json();
			
			const tbody = document.getElementById('productBody');
			tbody.innerHTML = ''; // 기존 메시지 삭제
			
			// 2. 데이터가 없을 때의 처리
			if (data.length === 0) {
				tbody.innerHTML = '<tr><td colspan="4">조회 결과가 없습니다.</td></tr>';
				return;
			}
			
			// 3. 백엔드에서 받은 데이터를 반복문으로 화면에 그리기 (완성된 로직)
			data.forEach(p => {
				const tr = document.createElement('tr');
				tr.innerHTML = `
					<td>${p.name}</td>
					<td class="price">${p.price.toLocaleString()}원</td>
					<td>${p.stock}개</td>
					<td class="date">${p.createdAt ? p.createdAt.substring(0, 10) : '-'}</td>
				`;
				tbody.appendChild(tr);
			});
		} catch (error) {
			console.error("데이터 조회 중 에러 발생:", error);
			alert("서버와 통신 중 오류가 발생했습니다.");
		}
	}
</script>
</body>
</html>
